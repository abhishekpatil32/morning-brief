# morning-brief configuration
# ----------------------------
# Copy this file to `config.yaml` and edit. The CLI looks for config.yaml in
# the current directory, then ~/.config/morning-brief/config.yaml.

# ----- Backend and LLM provider -----
# backend:
#   "api"         -- recommended for scheduled/unattended use
#   "claude-code" -- experimental; shells out to the local Claude Code CLI
backend: api

# provider:
#   "anthropic"          -- uses ANTHROPIC_API_KEY; supports Claude web search in this project
#   "openai-compatible" -- uses OPENAI_API_KEY + OPENAI_BASE_URL
#   "ollama"             -- local Ollama, usually no API key
#   "claude-code"        -- used automatically when backend=claude-code
provider: anthropic

# Model identifier for the chosen provider.
#
# Examples:
#   Anthropic:          claude-sonnet-4-6
#   OpenAI:             gpt-4o-mini
#   OpenRouter/Groq/etc: provider-specific model id
#   Ollama:             llama3.1:8b
model: claude-sonnet-4-6

runtime:
  timeout_seconds: 600


# ----- The topic of the digest -----
topic:
  name: "AI x Neuroscience"

  description: |
    Articles and preprints at the intersection of AI/ML and neuroscience.
    Both ingredients must be present in every paper -- pure-AI work and
    pure-neuroscience work should be skipped.

  # Bulleted list of areas of interest. Used to guide the search.
  include_areas:
    - "Deep learning for EEG, fMRI, MEG, iEEG, or other neural signal analysis"
    - "Brain-computer interfaces, neural decoding, neural signal reconstruction"
    - "Foundation models or LLMs trained on or applied to neural data"
    - "AI-driven analysis of brain disorders (depression, autism, Alzheimers)"
    - "Brain-inspired AI architectures or learning rules"
    - "LLMs as models of language processing in the brain"
    - "Mechanistic interpretability informed by neuroscience"

  # Free-text guidance on which sources Claude should prioritize.
  sources: |
    arXiv (cs.LG, cs.AI, q-bio.NC, eess.SP), PubMed, bioRxiv,
    Nature Neuroscience, NeuroImage, eLife, and similar peer-reviewed venues.

# ----- What the digest looks like -----
output:
  num_articles: 5
  recency_days: 14
  summary_sentences: "3-4"

# ----- Filters Claude is asked to apply -----
filters:
  exclude_blogs: true
  prefer_peer_reviewed: false
  language: "English"

# ----- Where dedup state is kept -----
# Relative paths are resolved from the config file's directory.
state:
  seen_file: "seen.txt"
  # How many recent URLs to inject into the prompt as "do not pick these"
  inject_recent: 500

# ----- Email rendering -----
email:
  # Subject line. Available variables: {topic_name}, {date}
  subject: "{topic_name} Digest -- {date}"
  # Header tagline shown above the title in the HTML email
  tagline: "Daily Research Brief"
  # Footer line below the entries
  footer: "Curated by AI · Powered by morning-brief"
